name: mini_habit_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  

  # Date formatting
  intl: ^0.20.2

  # Fonts & Icons
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Firebase dependencies
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.2
  cloud_firestore: ^5.5.0

  # Local database & state management
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.0
  provider: ^6.1.2

  # UI & features
  fl_chart: ^0.65.0
  table_calendar: ^3.1.2
  flutter_slidable: ^4.0.3
  flutter_heatmap_calendar: ^1.0.5

  # Shared preferences for Notepad
  shared_preferences: ^2.1.1

  

  # Permission handling
  permission_handler: ^11.3.1

  # Backup & Restore
  share_plus: ^10.0.0
  file_picker: ^8.0.0

  # AI
  http: ^1.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  # Lints & Code Generators
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
